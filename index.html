<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mimo 💙</title>

<style>

/* GOOGLE FONT */
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BODY */
body{
font-family:'Nunito',sans-serif;
height:100vh;
overflow:hidden;
background:linear-gradient(180deg,#031126,#08254a,#103f7d);
color:white;
}

/* MAIN */
#app{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
}

/* STARS */
.stars{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
overflow:hidden;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation: twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

/* FLOATING PARTICLES */
.particle{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
background:rgba(130,200,255,.35);
animation: floatUp 10s linear infinite;
}

@keyframes floatUp{
0%{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-20vh);
opacity:0;
}
}

/* SCENES */
.scene{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
padding:25px;
opacity:0;
transition:all .8s ease;
}

.scene.active{
display:flex;
opacity:1;
}

/* GLASS CARD */
.card{
width:100%;
max-width:380px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(14px);
padding:30px 20px;
border-radius:28px;
border:1px solid rgba(255,255,255,.15);
box-shadow:0 0 35px rgba(100,180,255,.18);
text-align:center;
}

/* TITLE */
h1,h2{
line-height:1.4;
margin-bottom:18px;
}

/* TYPE TEXT */
#typing{
font-size:18px;
min-height:80px;
line-height:1.7;
color:#d7eeff;
}

/* PROGRESS */
.progress-box{
margin-top:25px;
width:100%;
height:8px;
background:rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#6ebfff,#ffffff);
animation:loadBar 3s linear forwards;
}

@keyframes loadBar{
100%{
width:100%;
}
}

/* BUTTON */
button{
margin-top:25px;
padding:15px 32px;
border:none;
border-radius:40px;
background:linear-gradient(90deg,#4f9fff,#7fc6ff);
color:white;
font-size:16px;
font-family:'Nunito';
font-weight:700;
cursor:pointer;
box-shadow:0 0 25px rgba(100,180,255,.35);
animation:pulse 2s infinite;
transition:.3s;
}

button:active{
transform:scale(.95);
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* TEXT */
.info{
margin:12px 0;
font-size:18px;
color:#dcefff;
}

/* FLASH EFFECT */
.flash{
animation:flash .5s ease;
}

@keyframes flash{
0%{opacity:1;}
50%{opacity:.2;}
100%{opacity:1;}
}

</style>
</head>

<body>

<div id="app">

<!-- STARS -->
<div class="stars" id="stars"></div>


<!-- SCENE 1 -->
<section class="scene active" id="scene1">

<div class="card">

<h2>Memory Archive System</h2>

<div id="typing"></div>

<div class="progress-box">
<div class="progress"></div>
</div>

</div>

</section>


<!-- SCENE 2 -->
<section class="scene" id="scene2">

<div class="card">

<h2>Identity Confirmed 💙</h2>

<p class="info">Name : Mujgan</p>

<p class="info">Alias : Mimo</p>

<p class="info">Special Date Detected...</p>

<p class="info">18 July 🎂</p>

<button onclick="beginJourney()">

Begin Memory Journey

</button>

</div>

</section>


</div>


<script>

/* STARS GENERATOR */

let stars = document.getElementById("stars");

for(let i=0;i<70;i++){

let s = document.createElement("div");
s.classList.add("star");

s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";

s.style.animationDuration=(1+Math.random()*3)+"s";

stars.appendChild(s);

}

/* PARTICLES */

for(let i=0;i<15;i++){

let p=document.createElement("div");
p.classList.add("particle");

p.style.left=Math.random()*100+"%";
p.style.animationDuration=(8+Math.random()*6)+"s";

document.body.appendChild(p);

}

/* TYPEWRITER */

const lines = [

"Searching archives...",

"Recovering chats...",

"Scanning memories...",

"Someone important detected...",

"Mimo found 💙"

];

let index=0;

let typing = document.getElementById("typing");

function showLines(){

if(index<lines.length){

typing.innerHTML += lines[index] + "<br>";

index++;

setTimeout(showLines,500);

}

}

showLines();


/* AUTO CHANGE */

setTimeout(()=>{

document.getElementById("scene1")
.classList.remove("active");

document.getElementById("scene2")
.classList.add("active");

document.body.classList.add("flash");

},3200);



function beginJourney(){

alert("PART 2 will continue next 😄💙");

}

</script>

</body>
</html>
